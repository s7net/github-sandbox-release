name: Download & Upload to Release

on:
  push:
    branches:
      - "**"

jobs:
  release-file:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 zip

      - name: Extract URLs and download files
        run: |
          MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $MSG"

          if echo "$MSG" | grep -q 'download-zip:'; then
            MODE="zip"
            URL_LINE=$(echo "$MSG" | grep 'download-zip:' | sed 's/.*download-zip:\s*//')
          elif echo "$MSG" | grep -q 'download:'; then
            MODE="normal"
            URL_LINE=$(echo "$MSG" | grep 'download:' | sed 's/.*download:\s*//')
          else
            echo "❌ No download command found"
            exit 1
          fi

          echo "Mode: $MODE"
          mkdir -p downloads tmp_downloads

          echo "$URL_LINE" | tr ' ' '\n' | while read -r URL; do
            [ -z "$URL" ] && continue
            FILENAME=$(basename "$URL")
            echo "⬇️ Downloading $URL -> $FILENAME"

            aria2c \
              --split=2 \
              --max-connection-per-server=2 \
              --min-split-size=10M \
              --out="$FILENAME" \
              --dir="tmp_downloads" \
              "$URL"
          done

          if [ "$MODE" = "zip" ]; then
            ARCHIVE_NAME="downloads/archive_$(date +%Y%m%d_%H%M%S).zip"
            zip -j "$ARCHIVE_NAME" tmp_downloads/*
          else
            cp tmp_downloads/* downloads/
          fi

          # Split files larger than 90MB
          mkdir -p final
          LIMIT=$((90 * 1024 * 1024))

          for FILE in downloads/*; do
            SIZE=$(stat -c%s "$FILE")
            BASENAME=$(basename "$FILE")

            if [ "$SIZE" -gt "$LIMIT" ]; then
              echo "✂️ Splitting $BASENAME ..."
              zip -s 90m "final/${BASENAME}.zip" "$FILE"
            else
              cp "$FILE" "final/$BASENAME"
            fi
          done

      - name: Create Release & Upload
        uses: softprops/action-gh-release@v2
        with:
          tag_name: auto-${{ github.run_id }}
          name: Auto Download ${{ github.run_id }}
          files: final/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

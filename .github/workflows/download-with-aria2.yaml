name: Download & Upload to Release

on:
  push:
    branches:
      - "**"

jobs:
  release-file:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 zip curl jq

      - name: Extract URLs and download files
        run: |
          MSG=$(git log -1 --pretty=%B)

          if echo "$MSG" | grep -q 'download-zip:'; then
            MODE="zip"
            URL_LINE=$(echo "$MSG" | grep 'download-zip:' | sed 's/.*download-zip:\s*//')
          elif echo "$MSG" | grep -q 'download:'; then
            MODE="normal"
            URL_LINE=$(echo "$MSG" | grep 'download:' | sed 's/.*download:\s*//')
          else
            echo "❌ No download command found"
            exit 1
          fi

          mkdir -p downloads tmp_downloads

          echo "$URL_LINE" | tr ' ' '\n' | while read -r URL; do
            [ -z "$URL" ] && continue
            FILENAME=$(basename "$URL")

            aria2c --out="$FILENAME" --dir="tmp_downloads" "$URL"
          done

          if [ "$MODE" = "zip" ]; then
            ARCHIVE_NAME="downloads/archive_$(date +%Y%m%d_%H%M%S).zip"
            zip -j "$ARCHIVE_NAME" tmp_downloads/*
          else
            cp tmp_downloads/* downloads/
          fi

          mkdir -p final
          cp downloads/* final/

      - name: Create final ZIP
        run: |
          FINAL_ZIP="release_${{ github.run_id }}.zip"
          zip -r "$FINAL_ZIP" final/
          echo "FINAL_ZIP=$FINAL_ZIP" >> $GITHUB_ENV

      - name: Create Release & Upload
        uses: softprops/action-gh-release@v2
        with:
          tag_name: auto-${{ github.run_id }}
          name: Auto Download ${{ github.run_id }}
          files: ${{ env.FINAL_ZIP }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get asset download URL
        run: |
          TAG="auto-${{ github.run_id }}"
          REPO="${{ github.repository }}"

          RESPONSE=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/$REPO/releases/tags/$TAG")

          DOWNLOAD_URL=$(echo "$RESPONSE" | jq -r '.assets[0].browser_download_url')

          echo "DOWNLOAD_URL=$DOWNLOAD_URL" >> $GITHUB_ENV

      - name: Validate link
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -L "$DOWNLOAD_URL")

          echo "HTTP Status: $STATUS"

          if [ "$STATUS" != "200" ]; then
            echo "❌ Link invalid"
            exit 1
          fi

      - name: Update Release Notes
        run: |
          TAG="auto-${{ github.run_id }}"
          REPO="${{ github.repository }}"

          BODY=$(printf "📦 Download Ready\n\n🔗 Direct Link:\n%s\n\n---\nGenerated automatically ✅" "$DOWNLOAD_URL")

          curl -X PATCH \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/$REPO/releases/tags/$TAG" \
            -d "$(jq -n --arg body "$BODY" '{body: $body}')"
